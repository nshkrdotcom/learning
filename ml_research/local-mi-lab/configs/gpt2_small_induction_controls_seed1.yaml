experiment:
  name: gpt2_small_induction_controls_seed1
  seed: 1

model:
  name: gpt2-small
  backend: transformer_lens
  device: cuda
  dtype: float32
  use_inference_mode: true

resources:
  max_disk_cache_gb: 100
  max_activation_cache_gb_per_run: 20
  max_ram_gb_per_run: 64
  max_gpu_vram_fraction: 0.80
  max_examples_initial: 192
  max_examples_full: 1024
  batch_size_auto: true

task:
  name: induction_controls
  prompt_style: controlled_repeated_token_sequences
  n_examples_initial_per_family: 32
  families:
    - positive_repeat_sequence
    - no_repeat_control
    - shuffled_repeat_control
    - distractor_repeat_control
    - same_token_frequency_control
    - random_expected_token_control

activations:
  cache_strategy: selected_layers
  token_positions: [final]
  layers: auto_even_6

attention:
  layers: auto_even_6
  top_k_heads: 20

outputs:
  run_root: runs
