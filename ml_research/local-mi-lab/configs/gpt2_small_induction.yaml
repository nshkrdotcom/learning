experiment:
  name: gpt2_small_induction
  seed: 0

model:
  name: gpt2-small
  backend: transformer_lens
  device: cuda
  dtype: float32
  use_inference_mode: true

resources:
  max_disk_cache_gb: 100
  max_activation_cache_gb_per_run: 20
  max_ram_gb_per_run: 64
  max_gpu_vram_fraction: 0.80
  max_examples_initial: 64
  max_examples_full: 512
  batch_size_auto: true

task:
  name: induction
  prompt_style: repeated_token_sequences
  n_examples_initial: 64

activations:
  cache_strategy: selected_layers
  token_positions: [final]
  layers: auto_even_6

outputs:
  run_root: runs
