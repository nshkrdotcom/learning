run:
  name: multi_qkv_train_rotation_3track_global_30m_seed1
  out_dir: runs/experiments/E002_multitrack_qkv_shift_register/multi_qkv_train_rotation_3track_global_30m_seed1
  seed: 1337

data:
  data_root: data/fineweb_edu_100m
  tokenizer: gpt2
  vocab_size: 50304
  train_tokens: 100000000
  val_tokens: 4000000

model:
  attention_type: multi_qkv_train_rotation_3track_global
  qkv_track_count: 3
  qkv_global_bank: true
  qkv_route_formula: layer_plus_step_train_layer_eval
  block_size: 1024
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0
  bias: false

train:
  device: cuda
  dtype: bfloat16
  compile: false
  eval_at_start: true
  B: 4
  T: 1024
  total_batch_size: 262144
  max_steps: 3000
  grad_clip: 1.0
  weight_decay: 0.1
  learning_rate: 0.0006
  min_lr: 0.00006
  warmup_steps: 100
  val_every: 250
  val_steps: 20
  save_every: 1000
  log_every: 10

sample:
  sample_every: 1000
  prompt: "The history of mathematics"
  num_samples: 4
  max_new_tokens: 96
  top_k: 50
  temperature: 1.0
  seed: 42

diagnostics:
  attention_diagnostics_every: 250

queue:
  family: multitrack_qkv_shift_register
  hypothesis_doc: docs/experiments/E002_multitrack_qkv_shift_register/hypothesis_multi_qkv_train_rotation_3track_global_30m_seed1.md
  full_run_approved: false
  allow_overwrite_existing_run_dir: false
  requires_run: multi_qkv_static_3track_global_30m_seed1
  mechanism_check: qkv_track_activity
  allow_missing_diagnostics: false
