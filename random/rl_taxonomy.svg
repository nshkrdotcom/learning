<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">Reinforcement Learning Taxonomy</text>

  <style>
    .node { fill: #fff; stroke: #7B1FA2; stroke-width: 2; rx: 5; }
    .node-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #4A148C; }
    .leaf-text { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .link { stroke: #CE93D8; stroke-width: 2; fill: none; }
  </style>

  <!-- Level 1: RL -->
  <rect x="325" y="80" width="150" height="40" class="node" />
  <text x="400" y="105" class="node-text" text-anchor="middle">Reinforcement Learning</text>

  <!-- Links to Level 2 -->
  <path d="M400,120 L250,180" class="link" />
  <path d="M400,120 L550,180" class="link" />

  <!-- Level 2: Model-Free vs Model-Based -->
  <rect x="175" y="180" width="150" height="40" class="node" />
  <text x="250" y="205" class="node-text" text-anchor="middle">Model-Free</text>

  <rect x="475" y="180" width="150" height="40" class="node" />
  <text x="550" y="205" class="node-text" text-anchor="middle">Model-Based</text>
  <text x="550" y="235" class="leaf-text" text-anchor="middle">Learns env dynamics</text>

  <!-- Links from Model-Free to Level 3 -->
  <path d="M250,220 L125,280" class="link" />
  <path d="M250,220 L250,280" class="link" />
  <path d="M250,220 L375,280" class="link" />

  <!-- Level 3: Value-Based, Policy-Based, Actor-Critic -->
  <rect x="50" y="280" width="150" height="40" class="node" />
  <text x="125" y="305" class="node-text" text-anchor="middle">Value-Based</text>
  <text x="125" y="335" class="leaf-text" text-anchor="middle">Q-Learning, DQN</text>
  <text x="125" y="350" class="leaf-text" text-anchor="middle">Learn action values</text>

  <rect x="175" y="280" width="150" height="40" class="node" />
  <text x="250" y="305" class="node-text" text-anchor="middle">Policy-Based</text>
  <text x="250" y="335" class="leaf-text" text-anchor="middle">REINFORCE, PPO</text>
  <text x="250" y="350" class="leaf-text" text-anchor="middle">Learn policy directly</text>

  <rect x="300" y="280" width="150" height="40" class="node" />
  <text x="375" y="305" class="node-text" text-anchor="middle">Actor-Critic</text>
  <text x="375" y="335" class="leaf-text" text-anchor="middle">A2C, SAC, PPO*</text>
  <text x="375" y="350" class="leaf-text" text-anchor="middle">Hybrid approach</text>

  <!-- Highlight Deep RL -->
  <rect x="50" y="400" width="700" height="150" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" stroke-dasharray="5,5" rx="15" />
  <text x="400" y="430" class="node-text" text-anchor="middle" font-size="18">Deep Reinforcement Learning</text>
  <text x="400" y="460" class="leaf-text" text-anchor="middle">When value functions or policies are parameterized by Neural Networks</text>
  <text x="400" y="485" class="leaf-text" text-anchor="middle">Enables solving high-dimensional problems like Games and Robotics</text>
</svg>
