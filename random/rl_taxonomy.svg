<svg width="850" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1A237E; }
      .node { fill: #ffffff; stroke: #1A237E; stroke-width: 1.5; rx: 8; }
      .header { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1A237E; }
      .text { font-family: sans-serif; font-size: 11px; fill: #555; }
      .link { stroke: #999; stroke-width: 1.5; fill: none; }
      .highlight { fill: #E8EAF6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="425" y="40" class="title" text-anchor="middle">Reinforcement Learning Taxonomy</text>

  <!-- Level 1 -->
  <rect x="350" y="80" width="150" height="40" class="node highlight" />
  <text x="425" y="105" class="header" text-anchor="middle">RL Agent</text>

  <path d="M425,120 L275,180" class="link" />
  <path d="M425,120 L575,180" class="link" />

  <!-- Level 2 -->
  <rect x="200" y="180" width="150" height="40" class="node" />
  <text x="275" y="205" class="header" text-anchor="middle">Model-Free</text>

  <rect x="500" y="180" width="150" height="40" class="node" />
  <text x="575" y="205" class="header" text-anchor="middle">Model-Based</text>

  <path d="M275,220 L150,280" class="link" />
  <path d="M275,220 L275,280" class="link" />
  <path d="M275,220 L400,280" class="link" />

  <path d="M575,220 L400,280" class="link" />
  <path d="M575,220 L575,280" class="link" />
  <path d="M575,220 L700,280" class="link" />

  <!-- Level 3 -->
  <!-- Value-Based -->
  <rect x="75" y="280" width="150" height="60" class="node" />
  <text x="150" y="300" class="header" text-anchor="middle">Value-Based</text>
  <text x="150" y="320" class="text" text-anchor="middle">Q-Learning, DQN</text>

  <!-- Policy-Based -->
  <rect x="200" y="280" width="150" height="60" class="node" />
  <text x="275" y="300" class="header" text-anchor="middle">Policy-Based</text>
  <text x="275" y="320" class="text" text-anchor="middle">REINFORCE, PPO*</text>

  <!-- Actor-Critic (Common to both) -->
  <rect x="325" y="280" width="150" height="60" class="node highlight" />
  <text x="400" y="300" class="header" text-anchor="middle">Actor-Critic</text>
  <text x="400" y="320" class="text" text-anchor="middle">A3C, SAC, PPO*</text>

  <!-- Model-Based specific leaves (for balance) -->
  <rect x="500" y="280" width="150" height="60" class="node" />
  <text x="575" y="300" class="header" text-anchor="middle">Planning</text>
  <text x="575" y="320" class="text" text-anchor="middle">AlphaZero (MCTS)</text>

  <rect x="625" y="280" width="150" height="60" class="node" />
  <text x="700" y="300" class="header" text-anchor="middle">World Models</text>
  <text x="700" y="320" class="text" text-anchor="middle">DreamerV3</text>

  <!-- Legend / Deep RL section -->
  <g transform="translate(75, 420)">
    <rect x="0" y="0" width="700" height="130" fill="#f5f5f5" rx="10" />
    <text x="20" y="30" class="header">Notes:</text>
    <text x="40" y="60" class="text">• PPO* is listed under both: It's a policy-gradient method often implemented with a value-function critic.</text>
    <text x="40" y="85" class="text">• Model-Based methods can also utilize Value/Policy-Based techniques internally for planning.</text>
    <text x="40" y="110" class="text" font-weight="bold" fill="#C2185B">Deep RL: When any of the above uses Neural Networks for function approximation.</text>
  </g>
</svg>
