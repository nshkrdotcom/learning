<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">Historical Timeline of AI/ML</text>

  <style>
    .line { stroke: #333; stroke-width: 2; }
    .milestone-line { stroke: #999; stroke-width: 1; stroke-dasharray: 2; }
    .milestone-circle { fill: #1976D2; }
    .year-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1976D2; }
    .event-text { font-family: Arial, sans-serif; font-size: 11px; fill: #444; }
    .era-rect { fill-opacity: 0.1; }
  </style>

  <!-- Timeline Line -->
  <line x1="50" y1="250" x2="1150" y2="250" class="line" />

  <!-- Eras -->
  <rect x="50" y="80" width="200" height="150" class="era-rect" fill="#90CAF9" />
  <text x="150" y="100" class="event-text" font-weight="bold" text-anchor="middle">Early AI &amp; Perceptrons</text>

  <rect x="250" y="80" width="300" height="150" class="era-rect" fill="#A5D6A7" />
  <text x="400" y="100" class="event-text" font-weight="bold" text-anchor="middle">Classical ML Era</text>

  <rect x="550" y="80" width="400" height="150" class="era-rect" fill="#CE93D8" />
  <text x="750" y="100" class="event-text" font-weight="bold" text-anchor="middle">Deep Learning Boom</text>

  <rect x="950" y="80" width="200" height="150" class="era-rect" fill="#FFCC80" />
  <text x="1050" y="100" class="event-text" font-weight="bold" text-anchor="middle">Generative &amp; Reasoning Era</text>

  <!-- Milestones -->
  <!-- 1950s -->
  <circle cx="100" cy="250" r="5" class="milestone-circle" />
  <line x1="100" y1="250" x2="100" y2="230" class="milestone-line" />
  <text x="100" y="275" class="year-text" text-anchor="middle">1950s</text>
  <text x="100" y="220" class="event-text" text-anchor="middle">Perceptron (Rosenblatt)</text>
  <text x="100" y="205" class="event-text" text-anchor="middle">Symbolic AI</text>

  <!-- 1980s -->
  <circle cx="250" cy="250" r="5" class="milestone-circle" />
  <line x1="250" y1="250" x2="250" y2="230" class="milestone-line" />
  <text x="250" y="275" class="year-text" text-anchor="middle">1980s</text>
  <text x="250" y="220" class="event-text" text-anchor="middle">Backpropagation</text>

  <!-- 1990s-2000s -->
  <circle cx="400" cy="250" r="5" class="milestone-circle" />
  <line x1="400" y1="250" x2="400" y2="230" class="milestone-line" />
  <text x="400" y="275" class="year-text" text-anchor="middle">1990s-2000s</text>
  <text x="400" y="220" class="event-text" text-anchor="middle">SVMs, Random Forests</text>
  <text x="400" y="205" class="event-text" text-anchor="middle">Classical ML dominance</text>

  <!-- 2012 -->
  <circle cx="600" cy="250" r="5" class="milestone-circle" fill="#E91E63" />
  <line x1="600" y1="250" x2="600" y2="230" class="milestone-line" />
  <text x="600" y="275" class="year-text" text-anchor="middle">2012</text>
  <text x="600" y="220" class="event-text" text-anchor="middle" font-weight="bold">AlexNet (Deep Learning)</text>

  <!-- 2017 -->
  <circle cx="750" cy="250" r="5" class="milestone-circle" fill="#E91E63" />
  <line x1="750" y1="250" x2="750" y2="230" class="milestone-line" />
  <text x="750" y="275" class="year-text" text-anchor="middle">2017</text>
  <text x="750" y="220" class="event-text" text-anchor="middle">Transformer Architecture</text>

  <!-- 2022 -->
  <circle cx="950" cy="250" r="5" class="milestone-circle" fill="#E91E63" />
  <line x1="950" y1="250" x2="950" y2="230" class="milestone-line" />
  <text x="950" y="275" class="year-text" text-anchor="middle">2022</text>
  <text x="950" y="220" class="event-text" text-anchor="middle" font-weight="bold">ChatGPT / Diffusion</text>

  <!-- 2025+ -->
  <circle cx="1100" cy="250" r="5" class="milestone-circle" fill="#E91E63" />
  <line x1="1100" y1="250" x2="1100" y2="230" class="milestone-line" />
  <text x="1100" y="275" class="year-text" text-anchor="middle">2025+</text>
  <text x="1100" y="220" class="event-text" text-anchor="middle">Reasoning &amp; Agents</text>
  <text x="1100" y="205" class="event-text" text-anchor="middle">RL for Capability</text>
</svg>
