<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1A237E; }
      .era-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1A237E; }
      .year { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #C2185B; }
      .event { font-family: sans-serif; font-size: 11px; fill: #444; }
      .line { stroke: #1A237E; stroke-width: 2; fill: none; }
      .milestone { fill: #C2185B; }
      .era-box { fill-opacity: 0.1; stroke-width: 1; stroke: #999; }
      .connector { stroke: #C2185B; stroke-width: 1; stroke-dasharray: 2; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="600" y="40" class="title" text-anchor="middle">Acceleration of AI History</text>

  <!-- Timeline Base Line -->
  <line x1="50" y1="450" x2="1150" y2="450" class="line" />

  <!-- Era 1: Symbolic / Early AI (1950s - 1980s) -->
  <rect x="50" y="80" width="400" height="320" class="era-box" fill="#E8EAF6" />
  <text x="250" y="105" class="era-label" text-anchor="middle">Early AI &amp; Perceptrons</text>

  <circle cx="80" cy="450" r="5" class="milestone" />
  <line x1="80" y1="450" x2="80" y2="155" class="connector" />
  <text x="80" y="475" class="year" text-anchor="middle">1950s</text>
  <text x="80" y="140" class="event" text-anchor="middle">Perceptron (Rosenblatt)</text>

  <!-- AI Winter -->
  <rect x="150" y="180" width="200" height="60" fill="#fff" stroke="#C2185B" stroke-dasharray="4" rx="5"/>
  <text x="250" y="205" class="year" text-anchor="middle">1969 - 1980s</text>
  <text x="250" y="225" class="event" text-anchor="middle" font-weight="bold">AI WINTER</text>

  <!-- Era 2: Classical ML (1980s - 2012) -->
  <rect x="450" y="80" width="300" height="320" class="era-box" fill="#C8E6C9" />
  <text x="600" y="105" class="era-label" text-anchor="middle">Classical ML Era</text>

  <circle cx="470" cy="450" r="5" class="milestone" />
  <line x1="470" y1="450" x2="470" y2="155" class="connector" />
  <text x="470" y="475" class="year" text-anchor="middle">1986</text>
  <text x="470" y="140" class="event" text-anchor="middle">Backpropagation popularised</text>

  <circle cx="550" cy="450" r="5" class="milestone" />
  <line x1="550" y1="450" x2="550" y2="255" class="connector" />
  <text x="550" y="475" class="year" text-anchor="middle">1990s-00s</text>
  <text x="550" y="240" class="event" text-anchor="middle">SVMs, Random Forests</text>

  <circle cx="680" cy="450" r="5" class="milestone" />
  <line x1="680" y1="450" x2="680" y2="285" class="connector" />
  <text x="680" y="475" class="year" text-anchor="middle">2006</text>
  <text x="680" y="270" class="event" text-anchor="middle">"Deep Learning" rebranding</text>

  <!-- Era 3: Deep Learning Boom (2012 - 2022) -->
  <rect x="750" y="80" width="220" height="320" class="era-box" fill="#F3E5F5" />
  <text x="860" y="105" class="era-label" text-anchor="middle">Deep Learning Boom</text>

  <circle cx="760" cy="450" r="5" class="milestone" />
  <line x1="760" y1="450" x2="760" y2="155" class="connector" />
  <text x="760" y="475" class="year" text-anchor="middle">2012</text>
  <text x="760" y="140" class="event" text-anchor="middle" font-weight="bold">AlexNet (Mainstream DL)</text>

  <circle cx="820" cy="450" r="5" class="milestone" />
  <line x1="820" y1="450" x2="820" y2="185" class="connector" />
  <text x="820" y="475" class="year" text-anchor="middle">2014</text>
  <text x="820" y="170" class="event" text-anchor="middle">GANs / Attention</text>

  <circle cx="880" cy="450" r="5" class="milestone" />
  <line x1="880" y1="450" x2="880" y2="215" class="connector" />
  <text x="880" y="475" class="year" text-anchor="middle">2017</text>
  <text x="880" y="200" class="event" text-anchor="middle">Transformer</text>

  <circle cx="930" cy="450" r="5" class="milestone" />
  <line x1="930" y1="450" x2="930" y2="245" class="connector" />
  <text x="930" y="475" class="year" text-anchor="middle">2018-20</text>
  <text x="930" y="230" class="event" text-anchor="middle">BERT / GPT / Scaling Laws</text>

  <!-- Era 4: Generative & Reasoning (2022+) -->
  <!-- Narrower box (100 vs 220) to show acceleration -->
  <rect x="970" y="80" width="130" height="320" class="era-box" fill="#FFF3E0" />
  <text x="1035" y="105" class="era-label" text-anchor="middle">GenAI &amp; Reasoning</text>

  <circle cx="990" cy="450" r="5" class="milestone" />
  <line x1="990" y1="450" x2="990" y2="155" class="connector" />
  <text x="990" y="475" class="year" text-anchor="middle">2022</text>
  <text x="990" y="140" class="event" text-anchor="middle">ChatGPT / Diffusion</text>

  <circle cx="1070" cy="450" r="5" class="milestone" />
  <line x1="1070" y1="450" x2="1070" y2="185" class="connector" />
  <text x="1070" y="475" class="year" text-anchor="middle">2024-25</text>
  <text x="1070" y="170" class="event" text-anchor="middle">Reasoning &amp; Agents</text>

  <!-- Acceleration Label -->
  <text x="600" y="550" class="event" font-style="italic" text-anchor="middle">Visual width represents relative acceleration of breakthroughs (Horizontal distance is NOT linear with time)</text>
</svg>
