<svg width="850" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A237E" />
    </marker>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1A237E; }
      .box { fill: #ffffff; stroke: #1A237E; stroke-width: 1.5; rx: 10; }
      .box-important { stroke: #C2185B; stroke-width: 3; }
      .header { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1A237E; }
      .header-important { fill: #C2185B; }
      .text { font-family: sans-serif; font-size: 11px; fill: #555; }
      .line { stroke: #1A237E; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .line-dashed { stroke-dasharray: 5,5; }
      .legend-text { font-family: sans-serif; font-size: 12px; fill: #333; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="425" y="40" class="title" text-anchor="middle">Deep Learning Architectures &amp; Lineage</text>

  <!-- Row 1 -->
  <rect x="50" y="80" width="160" height="100" class="box" />
  <text x="130" y="110" class="header" text-anchor="middle">MLPs</text>
  <text x="130" y="135" class="text" text-anchor="middle">Feedforward nets</text>
  <text x="130" y="150" class="text" text-anchor="middle">No structural assumptions</text>

  <rect x="250" y="80" width="160" height="100" class="box" />
  <text x="330" y="110" class="header" text-anchor="middle">CNNs</text>
  <text x="330" y="135" class="text" text-anchor="middle">Assume spatial structure</text>
  <text x="330" y="150" class="text" text-anchor="middle">Local feature detectors</text>

  <rect x="450" y="80" width="160" height="100" class="box" />
  <text x="530" y="110" class="header" text-anchor="middle">RNNs / LSTMs</text>
  <text x="530" y="135" class="text" text-anchor="middle">Assume sequential structure</text>
  <text x="530" y="150" class="text" text-anchor="middle">Hidden state recurrence</text>

  <rect x="650" y="80" width="160" height="100" class="box box-important" />
  <text x="730" y="110" class="header header-important" text-anchor="middle">Transformers</text>
  <text x="730" y="135" class="text" text-anchor="middle">Parallel self-attention</text>
  <text x="730" y="150" class="text" text-anchor="middle">Current SOTA backbone</text>

  <!-- Lineage RNN -> Transformer -->
  <path d="M610,130 L640,130" class="line" />
  <text x="630" y="125" class="text" text-anchor="middle" font-weight="bold">Displaced</text>

  <!-- Row 2 -->
  <rect x="50" y="250" width="160" height="100" class="box" />
  <text x="130" y="280" class="header" text-anchor="middle">Autoencoders</text>
  <text x="130" y="305" class="text" text-anchor="middle">Bottleneck compression</text>

  <rect x="250" y="250" width="160" height="100" class="box" />
  <text x="330" y="280" class="header" text-anchor="middle">GNNs</text>
  <text x="330" y="305" class="text" text-anchor="middle">Assume graph structure</text>

  <rect x="450" y="250" width="160" height="100" class="box" />
  <text x="530" y="280" class="header" text-anchor="middle">GANs</text>
  <text x="530" y="305" class="text" text-anchor="middle">Adversarial training</text>

  <rect x="650" y="250" width="160" height="100" class="box" />
  <text x="730" y="280" class="header" text-anchor="middle">Diffusion Models</text>
  <text x="730" y="305" class="text" text-anchor="middle">Iterative denoising</text>

  <!-- Lineage GAN -> Diffusion -->
  <path d="M610,300 L640,300" class="line" />
  <text x="630" y="295" class="text" text-anchor="middle" font-weight="bold">Displaced</text>

  <!-- Legend & Nuance -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="760" height="150" fill="#f5f5f5" rx="10" />
    <text x="20" y="30" class="header">Key Insights:</text>
    <text x="40" y="60" class="legend-text">• Pink Border: Transformers are the dominant architecture for LLMs and increasingly Vision (ViT).</text>
    <text x="40" y="85" class="legend-text">• Lineage: Models evolve to better handle specific data structures or bypass previous bottlenecks.</text>
    <text x="40" y="110" class="legend-text">• Assumptions: Each design "bakes in" a belief about the input (e.g., local pixels, sequence order).</text>
  </g>
</svg>
