<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">Learning Paradigms</text>

  <style>
    .card { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .header { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
  </style>

  <!-- Supervised -->
  <rect x="50" y="80" width="220" height="120" rx="10" class="card" />
  <text x="160" y="110" class="header" fill="#D32F2F" text-anchor="middle">Supervised Learning</text>
  <text x="65" y="135" class="text">Learn x → y from labeled pairs</text>
  <text x="65" y="155" class="text">Classification, Regression</text>
  <circle cx="160" cy="180" r="5" fill="#D32F2F" />

  <!-- Unsupervised -->
  <rect x="290" y="80" width="220" height="120" rx="10" class="card" />
  <text x="400" y="110" class="header" fill="#1976D2" text-anchor="middle">Unsupervised Learning</text>
  <text x="305" y="135" class="text">Find structure in unlabeled data</text>
  <text x="305" y="155" class="text">Clustering, Dimensionality Reduction</text>
  <circle cx="400" cy="180" r="5" fill="#1976D2" />

  <!-- Self-Supervised -->
  <rect x="530" y="80" width="220" height="120" rx="10" class="card" />
  <text x="640" y="110" class="header" fill="#388E3C" text-anchor="middle">Self-Supervised</text>
  <text x="545" y="135" class="text">Construct labels from data itself</text>
  <text x="545" y="155" class="text">GPT pretraining, Masked tokens</text>
  <circle cx="640" cy="180" r="5" fill="#388E3C" />

  <!-- Semi-Supervised -->
  <rect x="170" y="240" width="220" height="120" rx="10" class="card" />
  <text x="280" y="270" class="header" fill="#FBC02D" text-anchor="middle">Semi-Supervised</text>
  <text x="185" y="295" class="text">Small labeled + large unlabeled data</text>
  <text x="185" y="315" class="text">Used together for performance</text>
  <circle cx="280" cy="340" r="5" fill="#FBC02D" />

  <!-- Reinforcement Learning -->
  <rect x="410" y="240" width="220" height="120" rx="10" class="card" />
  <text x="520" y="270" class="header" fill="#7B1FA2" text-anchor="middle">Reinforcement Learning</text>
  <text x="425" y="295" class="text">Learn via interaction and reward</text>
  <text x="425" y="315" class="text">Sequential decision-making</text>
  <circle cx="520" cy="340" r="5" fill="#7B1FA2" />

  <!-- Legend/Footer -->
  <text x="400" y="450" class="text" text-anchor="middle" font-style="italic">Independent of model architecture (can be Deep or Classical)</text>
</svg>
