<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1A237E; }
      .card { fill: #ffffff; stroke: #1A237E; stroke-width: 1.5; rx: 10; }
      .header { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #1A237E; }
      .text { font-family: sans-serif; font-size: 11px; fill: #555; }
      .special { fill: #FFF3E0; stroke: #FF6F00; }
      .special-header { fill: #E65100; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" class="title" text-anchor="middle">Learning Paradigms (Axis of Signal)</text>

  <!-- Row 1 -->
  <!-- Supervised -->
  <rect x="50" y="80" width="220" height="150" class="card" />
  <text x="160" y="110" class="header" text-anchor="middle">Supervised</text>
  <text x="65" y="135" class="text">Learn x → y from labeled pairs</text>
  <text x="65" y="155" class="text">Classification, Regression</text>

  <!-- Unsupervised -->
  <rect x="290" y="80" width="220" height="150" class="card" />
  <text x="400" y="110" class="header" text-anchor="middle">Unsupervised</text>
  <text x="305" y="135" class="text">Find structure in unlabeled x</text>
  <text x="305" y="155" class="text">Clustering, Density estimation</text>

  <!-- Semi-Supervised -->
  <rect x="530" y="80" width="220" height="150" class="card" />
  <text x="640" y="110" class="header" text-anchor="middle">Semi-Supervised</text>
  <text x="545" y="135" class="text">Small labeled + large unlabeled</text>
  <text x="545" y="155" class="text">Leverages both sources</text>

  <!-- Row 2 (Special cases) -->
  <!-- Self-Supervised -->
  <rect x="170" y="270" width="220" height="150" class="card special" />
  <text x="280" y="300" class="header special-header" text-anchor="middle">Self-Supervised</text>
  <text x="185" y="325" class="text">Labels free from data itself</text>
  <text x="185" y="345" class="text">"A trick on top of supervised"</text>
  <text x="185" y="365" class="text" font-style="italic">Foundation of modern LLMs</text>

  <!-- RL -->
  <rect x="410" y="270" width="220" height="150" class="card special" />
  <text x="520" y="300" class="header special-header" text-anchor="middle">Reinforcement (RL)</text>
  <text x="425" y="325" class="text">Learn via interaction &amp; reward</text>
  <text x="425" y="345" class="text">Sequential decision-making</text>
  <text x="425" y="365" class="text" font-style="italic">The "Odd one out" / agentic</text>

  <!-- Legend -->
  <text x="400" y="460" class="text" text-anchor="middle" font-style="italic">These five paradigms are orthogonal to model architecture (Deep vs Classical)</text>
</svg>
