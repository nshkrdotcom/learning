<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">Orthogonal Axes: Model Family vs. Learning Paradigm</text>

  <style>
    .grid-line { stroke: #eee; stroke-width: 1; }
    .label-x { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #444; text-anchor: middle; }
    .label-y { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #444; text-anchor: middle; transform: rotate(-90deg); }
    .cell { fill: #f9f9f9; stroke: #ccc; stroke-width: 1; }
    .content { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .header-bg { fill: #f0f0f0; }
  </style>

  <!-- Grid Header Backgrounds -->
  <rect x="150" y="80" width="600" height="50" class="header-bg" />
  <rect x="50" y="130" width="100" height="420" class="header-bg" />

  <!-- Column Labels -->
  <text x="250" y="110" class="label-x">Supervised</text>
  <text x="400" y="110" class="label-x">Unsupervised</text>
  <text x="550" y="110" class="label-x">Self-Supervised</text>
  <text x="700" y="110" class="label-x">Reinforcement</text>

  <!-- Row Labels -->
  <text x="-235" y="100" class="label-y">Classical ML</text>
  <text x="-445" y="100" class="label-y">Deep Learning</text>

  <!-- Matrix Cells -->
  <!-- Classical Rows -->
  <rect x="150" y="130" width="150" height="210" class="cell" />
  <text x="160" y="160" class="content">Linear Regression</text>
  <text x="160" y="180" class="content">Logistic Regression</text>
  <text x="160" y="200" class="content">SVMs, Random Forests</text>
  <text x="160" y="220" class="content">Gradient Boosted Trees</text>

  <rect x="300" y="130" width="150" height="210" class="cell" />
  <text x="310" y="160" class="content">K-Means Clustering</text>
  <text x="310" y="180" class="content">PCA</text>
  <text x="310" y="200" class="content">Gaussian Mixtures</text>

  <rect x="450" y="130" width="150" height="210" class="cell" />
  <text x="460" y="160" class="content">Word2Vec (shallow)</text>
  <text x="460" y="180" class="content">Matrix Factorization</text>

  <rect x="600" y="130" width="150" height="210" class="cell" />
  <text x="610" y="160" class="content">Tabular Q-Learning</text>
  <text x="610" y="180" class="content">Dynamic Programming</text>

  <!-- Deep Learning Rows -->
  <rect x="150" y="340" width="150" height="210" class="cell" fill="#E3F2FD" />
  <text x="160" y="370" class="content">CNN Classifiers</text>
  <text x="160" y="390" class="content">MLP Regressors</text>
  <text x="160" y="410" class="content">RNN/LSTM (Seq2Seq)</text>

  <rect x="300" y="340" width="150" height="210" class="cell" fill="#E3F2FD" />
  <text x="310" y="370" class="content">Autoencoders</text>
  <text x="310" y="390" class="content">VAEs</text>
  <text x="310" y="410" class="content">Deep Clustering</text>

  <rect x="450" y="340" width="150" height="210" class="cell" fill="#E3F2FD" />
  <text x="460" y="370" class="content">GPT Pretraining</text>
  <text x="460" y="390" class="content">BERT (Masked LM)</text>
  <text x="460" y="410" class="content">Contrastive Learning</text>

  <rect x="600" y="340" width="150" height="210" class="cell" fill="#E3F2FD" />
  <text x="610" y="370" class="content">Deep Q-Networks (DQN)</text>
  <text x="610" y="390" class="content">PPO, TRPO</text>
  <text x="610" y="410" class="content">RLHF</text>

  <!-- Representation Learning Overlay -->
  <rect x="150" y="130" width="600" height="420" fill="none" stroke="#F44336" stroke-width="3" stroke-dasharray="10,5" rx="10"/>
  <text x="450" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F44336" text-anchor="middle">Area emphasizing Representation Learning (mostly Deep Learning &amp; some Classical)</text>
</svg>
