<svg width="850" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 22px; font-weight: bold; fill: #1A237E; }
      .label-x { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1A237E; }
      .label-y { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1A237E; }
      .cell { fill: #f9f9f9; stroke: #e0e0e0; stroke-width: 1; }
      .content { font-family: sans-serif; font-size: 11px; fill: #444; }
      .rl-bg { fill: #FFF3E0; }
      .rep-learn-box { fill: none; stroke: #C2185B; stroke-width: 3; stroke-dasharray: 8; rx: 15; }
      .rep-learn-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #C2185B; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="425" y="40" class="title" text-anchor="middle">Model Family vs. Learning Paradigm</text>

  <!-- Column Headers -->
  <g transform="translate(150, 70)">
    <text x="75" y="20" class="label-x" text-anchor="middle">Supervised</text>
    <text x="225" y="20" class="label-x" text-anchor="middle">Unsupervised</text>
    <text x="375" y="20" class="label-x" text-anchor="middle">Self-Supervised</text>
    <text x="525" y="20" class="label-x" text-anchor="middle">Reinforcement</text>
  </g>

  <!-- Row: Classical ML -->
  <g transform="translate(0, 100)">
    <text x="70" y="100" class="label-y" text-anchor="middle" transform="rotate(-90, 70, 100)">Classical ML</text>

    <rect x="150" y="0" width="150" height="200" class="cell" />
    <text x="160" y="30" class="content">Linear Regression</text>
    <text x="160" y="50" class="content">Logistic Regression</text>
    <text x="160" y="70" class="content">Random Forests</text>
    <text x="160" y="90" class="content">SVMs</text>

    <rect x="300" y="0" width="150" height="200" class="cell" />
    <text x="310" y="30" class="content">k-Means</text>
    <text x="310" y="50" class="content">PCA</text>
    <text x="310" y="70" class="content">Gaussian Mixtures</text>

    <rect x="450" y="0" width="150" height="200" class="cell" />
    <text x="460" y="30" class="content">Word2Vec (Shallow)</text>
    <text x="460" y="50" class="content">Matrix Factorization</text>

    <rect x="600" y="0" width="150" height="200" class="cell rl-bg" />
    <text x="610" y="30" class="content">Tabular Q-Learning</text>
  </g>

  <!-- Row: Deep Learning -->
  <g transform="translate(0, 310)">
    <text x="70" y="100" class="label-y" text-anchor="middle" transform="rotate(-90, 70, 100)">Deep Learning</text>

    <rect x="150" y="0" width="150" height="200" class="cell" fill="#E8EAF6" />
    <text x="160" y="30" class="content">CNN Classifiers</text>
    <text x="160" y="50" class="content">Vision Transformers</text>

    <rect x="300" y="0" width="150" height="200" class="cell" fill="#E8EAF6" />
    <text x="310" y="30" class="content">Autoencoders</text>
    <text x="310" y="50" class="content">Diffusion Models</text>

    <rect x="450" y="0" width="150" height="200" class="cell" fill="#E8EAF6" />
    <text x="460" y="30" class="content">GPT / BERT</text>
    <text x="460" y="50" class="content">SimCLR / CLIP</text>

    <rect x="600" y="0" width="150" height="200" class="cell rl-bg" />
    <text x="610" y="30" class="content">Deep Q-Networks</text>
    <text x="610" y="50" class="content">PPO / SAC</text>
  </g>

  <!-- Representation Learning Overlay -->
  <!-- Covers all DL (excluding RL), and specific parts of Classical -->
  <rect x="305" y="110" width="290" height="80" class="rep-learn-box" /> <!-- Classical: PCA, Word2Vec -->
  <rect x="145" y="305" width="460" height="210" class="rep-learn-box" /> <!-- Deep Learning: Sup, Unsup, Self-Sup (Excludes RL) -->

  <text x="425" y="560" class="rep-learn-label" text-anchor="middle">Pink Dash: Representation Learning Region</text>
  <text x="425" y="580" class="content" text-anchor="middle">(Excludes hand-engineered Classical ML and RL paradigm per text)</text>

  <!-- RL highlight -->
  <text x="675" y="620" class="content" text-anchor="middle" font-style="italic">RL is the "Odd one out" (Non-static data)</text>
</svg>
