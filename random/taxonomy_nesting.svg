<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1A237E; }
      .label { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #1A237E; }
      .desc { font-family: sans-serif; font-size: 11px; fill: #555; }
      .box { rx: 10; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="300" y="40" class="title" text-anchor="middle">AI / ML / DL Taxonomy</text>

  <!-- AI -->
  <rect x="30" y="70" width="540" height="300" class="box" fill="#E8EAF6" stroke="#1A237E"/>
  <text x="50" y="95" class="label">Artificial Intelligence (AI)</text>
  <text x="50" y="115" class="desc">Any system that does tasks requiring "intelligence" (Rules, Search, Logic)</text>

  <!-- ML -->
  <rect x="60" y="140" width="480" height="200" class="box" fill="#C5CAE9" stroke="#1A237E"/>
  <text x="80" y="165" class="label">Machine Learning (ML)</text>
  <text x="80" y="185" class="desc">The AI subset that learns patterns from data rather than hand-coded rules</text>

  <!-- Representation Learning -->
  <rect x="90" y="210" width="420" height="100" class="box" fill="#9FA8DA" stroke="#1A237E"/>
  <text x="110" y="235" class="label">Representation Learning</text>
  <text x="110" y="255" class="desc">Model learns the features themselves from raw data</text>

  <!-- Deep Learning -->
  <rect x="120" y="270" width="360" height="30" class="box" fill="#7986CB" stroke="#1A237E"/>
  <text x="300" y="290" class="label" font-size="14" text-anchor="middle">Deep Learning (Stacked Neural Networks)</text>
</svg>
