<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- AI -->
  <rect x="20" y="20" width="560" height="360" rx="15" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0D47A1">Artificial Intelligence (AI)</text>
  <text x="40" y="75" font-family="Arial, sans-serif" font-size="12" fill="#1565C0">Any system that does tasks requiring "intelligence" (Rules, Search, Logic)</text>

  <!-- ML -->
  <rect x="60" y="100" width="500" height="260" rx="15" fill="#BBDEFB" stroke="#1976D2" stroke-width="2"/>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">Machine Learning (ML)</text>
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="12" fill="#1565C0">Improves performance by learning patterns from data</text>

  <!-- Representation Learning -->
  <rect x="100" y="170" width="440" height="170" rx="15" fill="#90CAF9" stroke="#1976D2" stroke-width="2"/>
  <text x="120" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0D47A1">Representation Learning</text>
  <text x="120" y="220" font-family="Arial, sans-serif" font-size="12" fill="#1565C0">Model learns the features themselves from raw data</text>

  <!-- Deep Learning -->
  <rect x="140" y="240" width="380" height="80" rx="15" fill="#64B5F6" stroke="#1976D2" stroke-width="2"/>
  <text x="160" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">Deep Learning</text>
  <text x="160" y="290" font-family="Arial, sans-serif" font-size="12" fill="#1565C0">Stacked layers of learned nonlinear transformations</text>
</svg>
